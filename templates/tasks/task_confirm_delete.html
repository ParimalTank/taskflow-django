{% extends 'base.html' %}

{% block title %}Delete Task - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 3rem;">
    <div class="col-md-5">
        <div class="delete-card">
            <div class="delete-icon"><i class="bi bi-trash3"></i></div>
            <h3>Delete "{{ task.title }}"?</h3>
            <p>This task will be permanently removed from "{{ task.board.name }}".</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'board_detail' org.slug task.board.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>Delete Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
