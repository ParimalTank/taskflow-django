{% extends 'base.html' %}

{% block title %}{{ title }} - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{% url 'board_detail' org.slug board.pk %}" style="color:var(--text-muted); text-decoration:none;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h2 class="mb-0" style="font-weight:700; letter-spacing:-0.5px;">{{ title }}</h2>
                <small style="color:var(--text-light);">{{ org.name }} / {{ board.name }}</small>
            </div>
        </div>
        <div class="form-card">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger mt-1" style="font-size:0.8rem;">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="bi bi-check-lg me-1"></i>Save Task
                    </button>
                    <a href="{% url 'board_detail' org.slug board.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
